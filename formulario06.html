<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="ativador">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="masc" required value="M"><label for="masc">Masculinho</label> <br>
            <input type="radio" name="sexo" id="femi" required value="F"><label for="femi">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <p>
                <input type="checkbox" name="futbol" id="futbol"> <label for="futbol">Futebol</label> <br>
                <input type="checkbox" name="basquet" id="basquet"> <label for="basquet">Basquete</label> <br>
                <input type="checkbox" name="futsal" id="futsal"> <label for="futsal">Futsal</label> <br>
                <input type="checkbox" name="tenis" id="tenis"> <label for="tenis">Tênis</label> <br>
                <input type="checkbox" name="volei" id="volei"> <label for="volei">Vôlei</label> <br>
            </p>
            
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
