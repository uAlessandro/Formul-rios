<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>

    <form action="ativador.php" method="post">
        <p>
            
            <label for="estados" >Estados</label>
            
            <select name="estados" id="estados" required>
                <option value=""selected>...Escolha...</option>
                <optgroup label="Região Sudeste">
                    <option value="RJ">Rio de Janeiro</optio>
                    <option value="SP" >São Paulo</option>
                    <option value="MG">Minas Gerais</option>
                </optgroup>

                <optgroup label="Região Nordeste">
                    <option value="MA">Maranhão</option>
                    <option value="PE">Pernambuco</option>
                    <option value="RN">Rio Grande do Norte</option>
                </optgroup>
            </select>
        </p>
        <p>
            <label for="prof">Profissão</label>
            <input type="text" name="prof" id="prof" list="profs" required>
            <datalist id="profs" >
                <option value="DEV">Desenvolvedor</option>
                <option value="CONT">Contador</option>
                <option value="PDR">Padeiro</option>
            </datalist>
        </p>
        <p>
            <label for="msg">Mensagem(opcional)</label> <br>
            <textarea name="img" id="img" cols="30" rows="10" placeholder="Digite uma mensagem"></textarea>
            

        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
