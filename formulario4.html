<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="ativador.php">

        <p>
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" id="nome" required maxlength="30" placeholder="Nome Completo">
        </p>

        <p>
            <label for="media">Média</label>
            <input type="number" name="media" id="media" required  min="0" max="10" placeholder="0 a 10" step="0.5">
        </p>
        <p>
            <label for="periodo">Período letivo</label>
           <input type="month" name="periodo" id="periodo" value="2025-06">
        </p>
        <p>
            <label for="prova">Data da Prova</label>
            <input type="date" name="prova" id="prova" required>
        </p>
        <p>
            <label for="hora">Hora da prova</label>
            <input type="time" name="hora" id="hora" required value="05:30">
        </p>
        <p>
            <label for="enviar"></label>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
           
            
        </p>
        



    </form>
    
</body>
</html>
