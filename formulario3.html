<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="ativador.php" method="post">
        <p>
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome"required placeholder=" Digite">
        </p>
        <p>
            <label for="sobrenome">Sobrenome</label>
            <input type="text" name="sobrenome" id="sobrenome" required placeholder="Digite" >

        </p>
        <p>
            <label for="email">e-mail</label>
            <input type="email" name="email" id="email" required placeholder="e-mail">
        </p>
        <p>
            <label for="mes">Mês</label>
            <input type="month" name="mes" id="mes" required value="2026-03" >
        </p>
        <p>
            <label for="hora">Hora</label>
            <input type="time" name="hora" id="hora" value="05:30">
        </p>
        <p>
            <label for="">Dia</label>
            <input type="date" name="dia" id="dia" required value="2026-03-25">
            
        </p>
        <p>
            <label for="Enviar"></label>
            <input type="submit" value="Enviar">
            
        </p>

    </form>

    
</body>
</html>
