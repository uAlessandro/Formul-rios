<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Input - Collor/file/range</h1>
    <Fieldset>
        <legend>Aprendendo</legend>
        <form action="ativador.php" method="post">

            <p>
                <label for="cores">Escolha uma cor: </label>
                <input type="color" name="cores" id="cores">
            </p>
            <p>
                <label for="satisfaçao">Nével de Satisfação: </label>
                <input type="range" name="satisfaçao" id="satisfaçao" min="1" max="10" value="5">
            </p>
            <p>
                <label for="foto">Foto do perfil: </label>
                <input type="file" name="foto" id="foto" required >
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
            
        </form>

    </Fieldset>
</body>
</html>
